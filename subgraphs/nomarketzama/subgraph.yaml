specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: NoMarket
    network: sepolia
    source:
      address: "0x662BF453e5FC4387c5DCDCEFc06B4A1EBAdc5887"
      abi: NoMarket
      startBlock: 11061586
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Market
        - Bet
        - ResolutionProposal
        - MarketResolution
      abis:
        - name: NoMarket
          file: ./abis/NoMarket.json
      eventHandlers:
        - event: MarketCreated(indexed uint256,indexed address,string,string,uint16)
          handler: handleMarketCreated
        - event: MarketLifecycleConfigured(indexed uint256,uint64,uint64,uint64,uint256)
          handler: handleMarketLifecycleConfigured
        - event: MarketCreationFeePaid(indexed uint256,indexed address,uint256)
          handler: handleMarketCreationFeePaid
        - event: BetPlaced(indexed uint256,indexed uint256,indexed address,uint256,bytes32,bytes32,bytes32)
          handler: handleBetPlaced
        - event: BetFeeCollected(indexed uint256,indexed uint256,uint256)
          handler: handleBetFeeCollected
        - event: UmaResolutionProposed(indexed uint256,indexed bytes32,uint16,string)
          handler: handleUmaResolutionProposed
        - event: MarketResolved(indexed uint256,uint16)
          handler: handleMarketResolved
        - event: CreatorFeesPaid(indexed uint256,indexed address,uint256)
          handler: handleCreatorFeesPaid
      file: ./src/no-market.ts
